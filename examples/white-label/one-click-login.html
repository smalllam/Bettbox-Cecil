<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>One-click import example</title>
  <style>
    body {
      color: #16201f;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 32px;
      max-width: 720px;
    }

    button, a.button {
      align-items: center;
      background: #17a2aa;
      border: 0;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      display: inline-flex;
      font: inherit;
      height: 40px;
      padding: 0 16px;
      text-decoration: none;
    }

    code {
      background: #eef4f3;
      border-radius: 4px;
      padding: 2px 5px;
    }
  </style>
</head>
<body>
  <h1>One-click import</h1>
  <p>
    Replace <code>appScheme</code>, download URLs, and
    <code>authDataFromServer</code> with values generated by your panel.
  </p>

  <button id="import-client">Import to client</button>

  <p id="fallback" hidden>
    If the client did not open, install it first:
    <a id="download-link" class="button" href="#">Download client</a>
  </p>

  <script>
    const appScheme = 'examplevpn';
    const androidDownloadUrl = 'https://example.com/download/examplevpn.apk';
    const windowsDownloadUrl = 'https://example.com/download/examplevpn-setup.exe';

    // In production, render this server-side for the signed-in user.
    const authDataFromServer = 'REPLACE_WITH_CURRENT_USER_AUTH_DATA';

    function isWindows() {
      return /Windows/i.test(navigator.userAgent);
    }

    function getDownloadUrl() {
      return isWindows() ? windowsDownloadUrl : androidDownloadUrl;
    }

    document.getElementById('import-client').addEventListener('click', () => {
      if (!authDataFromServer || authDataFromServer.startsWith('REPLACE_')) {
        alert('No authData was provided by the panel.');
        return;
      }

      const importUrl =
        `${appScheme}://install-config?authData=${encodeURIComponent(authDataFromServer)}`;

      window.location.href = importUrl;

      window.setTimeout(() => {
        const fallback = document.getElementById('fallback');
        const downloadLink = document.getElementById('download-link');
        downloadLink.href = getDownloadUrl();
        fallback.hidden = false;
      }, 1500);
    });
  </script>
</body>
</html>
