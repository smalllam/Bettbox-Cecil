name: bett_box
description: White-label proxy client based on Mihomo.
publish_to: 'none'
version: 1.0.0+2026064850
environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.5.5
  window_manager: ^0.5.1
  dynamic_color: ^1.8.1
  material_color_utilities: ^0.13.0
  vclibs: ^0.1.3
  proxy:
    path: plugins/proxy
  window_ext:
    path: plugins/window_ext
  tray_manager:
    path: plugins/tray_manager
  silky_scroll:
    path: plugins/silky_scroll
  launch_at_startup: ^0.5.1
  json_annotation: ^4.9.0
  file_picker: ^8.3.7
  mobile_scanner: ^7.2.0
  app_links: ^6.3.3
  win32_registry: ^2.0.0
  collection: ^1.18.0
  animations: ^2.1.2
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.0
  freezed_annotation: ^3.1.0
  image_picker: ^1.2.1
  webdav_client: ^1.2.2
  dio: ^5.9.2
  win32: ^5.15.0
  ffi: ^2.2.0
  re_editor: ^0.9.0
  re_highlight: ^0.0.3
  archive: ^4.0.7
  lpinyin: ^2.0.3
  emoji_regex: ^0.0.5
  hotkey_manager: ^0.2.3
  uni_platform: ^0.1.3
  device_info_plus: ^12.4.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.7
  yaml: ^3.1.2
  connectivity_plus: 7.0.0
  screen_retriever: ^0.2.0
  defer_pointer: ^0.0.2
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  riverpod: ^2.6.1
  flutter_js: ^0.8.7
  flutter_svg: ^2.2.4
  xml: ^6.6.1
  flutter_cache_manager: ^3.4.1
  crypto: ^3.0.7
  encrypt: ^5.0.3
  google_nav_bar: ^5.0.7
  wakelock_plus: ^1.4.0
  flutter_spinkit: ^5.2.2
  synchronized: ^3.4.0
  flutter_displaymode: ^0.7.0
  restart_app: ^1.8.3
  flutter_widget_from_html_core: 0.17.0
  markdown: ^7.3.1
  html: ^0.15.6
  desktop_webview_window: 0.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  ffigen: ^20.1.1
  json_serializable: ^6.9.5
  build_runner: ^2.4.15
  args: ^2.4.2
  freezed: ^3.1.0
  riverpod_generator: ^2.6.4
  custom_lint: ^0.7.6
  intl_utils: ^2.8.11

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/data/
    - assets/fonts/
    - assets/images/
    - assets/images/avatars/
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
    - family: Twemoji
      fonts:
        - asset: assets/fonts/Twemoji.Mozilla.ttf
    - family: Icons
      fonts:
        - asset: assets/fonts/Icons.ttf
    - family: HarmonyOS_Sans
      fonts:
        - asset: assets/fonts/HarmonyOS_Sans_SC_Regular.ttf
ffigen:
  name: "ClashFFI"
  output: 'lib/clash/generated/clash_ffi.dart'
  headers:
    entry-points:
      - 'libclash/android/arm64-v8a/libclash.h'
flutter_intl:
  enabled: true
  class_name: AppLocalizations
  arb_dir: arb
  output_dir: lib/l10n
